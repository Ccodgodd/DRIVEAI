<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interface - DriveLegal</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .chat-container { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.ai { align-self: flex-start; }
        .message-bubble { 
            padding: 12px 16px; border-radius: 4px; font-size: 14px; line-height: 1.5; font-family: 'Inter', sans-serif;
        }
        .message.user .message-bubble { background: rgba(255,42,133,0.15); border: 1px solid var(--accent-pink); color: #fff;}
        .message.ai .message-bubble { background: rgba(0,240,255,0.05); border: 1px solid var(--accent-cyan); color: var(--text-primary); white-space: pre-wrap; box-shadow: 0 0 10px rgba(0,240,255,0.1) inset;}
        
        .chat-input-area { padding: 16px 20px; border-top: 1px solid var(--accent-cyan); display: flex; gap: 10px; background: rgba(0,0,0,0.5);}
        .suggestion-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .chip { background: rgba(0,0,0,0.5); border: 1px solid var(--accent-purple); border-radius: 2px; padding: 10px; color: var(--text-primary); font-size: 11px; cursor: pointer; text-align: left; transition: 0.2s; font-family: 'Orbitron', sans-serif; text-transform: uppercase;}
        .chip:hover { border-color: var(--accent-yellow); color: var(--accent-yellow); box-shadow: 0 0 10px rgba(252,238,10,0.3) inset; }
    </style>
</head>
<body>
    <div class="global-bg"></div>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>

    <nav>
        <a href="index.html" class="logo">
            <span><i data-feather="crosshair"></i></span>
            Drive<span class="gradient-text">Legal</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Nexus</a>
            <a href="ask.html" class="active">AI Interface</a>
            <a href="challan.html">Penalty Calc</a>
            <a href="rights.html">Citizen Rights</a>
            <a href="compliance.html">Protocol</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="container" style="max-width: 800px;">
            <div class="badge badge-cyan mb-4" style="background: rgba(0,240,255,0.1); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); box-shadow: 0 0 10px rgba(0,240,255,0.5);">
                <i data-feather="cpu" style="width: 12px;"></i> AI NEURAL LINK ESTABLISHED
            </div>
            <h1 class="glitch-text mb-2" data-text="Terminal Access" style="color: #fff;">Terminal <span class="gradient-text">Access</span></h1>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; font-family: 'Orbitron', sans-serif;">Powered by Gemini Engine · Indian Motor Vehicles Protocol</p>
            
            <div class="anime-panel" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                <div class="chat-container" id="chatContainer">
                    <div id="welcomeState" class="text-center" style="margin: auto;">
                        <img src="assets/cyber_ai_assistant.png" alt="AI Assistant" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 2px solid var(--accent-cyan); box-shadow: 0 0 20px rgba(0,240,255,0.5); margin-bottom: 16px;">
                        <h3 class="cyber-font" style="color: var(--accent-cyan);">AWAITING INPUT...</h3>
                        <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 24px; font-family: 'Orbitron', sans-serif;">System trained on Indian Motor Vehicles Act.</p>
                        
                        <div class="suggestion-chips">
                            <button class="chip" onclick="setInput('What is the fine for driving without a helmet?')">HELMET VIOLATION PENALTY</button>
                            <button class="chip" onclick="setInput('Can police seize my vehicle for expired insurance?')">INSURANCE EXPIRY SEIZURE</button>
                            <button class="chip" onclick="setInput('What are the rules for driving at night?')">NIGHT DRIVING PROTOCOL</button>
                            <button class="chip" onclick="setInput('What is the penalty for drunk driving in India?')">INTOXICATION PENALTY</button>
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <input type="text" id="userInput" class="input-field" placeholder="INPUT QUERY..." onkeypress="handleKeyPress(event)" style="font-family: 'Orbitron', sans-serif; text-transform: uppercase;">
                    <button id="sendBtn" class="cyber-button" onclick="sendMessage()" style="padding: 10px 20px;">
                        <i data-feather="send" style="width: 16px;"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/ask.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
